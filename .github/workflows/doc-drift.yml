name: Doc drift scan

# Nightly watchdog: looks at the last 24h of changes in the app + backend repos,
# compares them against the docs in this repo, and files a GitHub issue (labeled
# `doc-drift`) for each user-facing change the docs don't yet reflect. Issues
# only — it never edits docs or pushes commits.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   CLAUDE_CODE_OAUTH_TOKEN — long-lived Claude Code token from `claude setup-token`
#                             (runs on a Max/Pro subscription; no API credits needed).
#                             Do NOT also set ANTHROPIC_API_KEY — it takes precedence
#                             and would bill API credits instead.
#   DOCS_BOT_TOKEN          — fine-grained PAT with access to all three DWA repos:
#                               • Contents: Read  (docs, app, mcp)
#                               • Issues:  Read and write  (docs)
#   RESEND_API_KEY          — optional; enables the failure-notification email
#                             (same key as the backend's Render env). If missing,
#                             the email step skips — the scan itself still runs.
#
# Run it by hand anytime from the Actions tab (workflow_dispatch).

on:
  schedule:
    - cron: '0 9 * * *'      # 09:00 UTC nightly (~01:00–02:00 PT)
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: doc-drift
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs (this repo)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Checkout app repo
        uses: actions/checkout@v5
        with:
          repository: kirbsauce/dog-walker-assistant-app
          token: ${{ secrets.DOCS_BOT_TOKEN }}
          path: _watch/app
          fetch-depth: 0

      - name: Checkout backend repo
        uses: actions/checkout@v5
        with:
          repository: kirbsauce/dog-walker-assistant-mcp
          token: ${{ secrets.DOCS_BOT_TOKEN }}
          path: _watch/mcp
          fetch-depth: 0

      - name: Ensure doc-drift label exists
        env:
          GH_TOKEN: ${{ secrets.DOCS_BOT_TOKEN }}
        run: |
          gh label create doc-drift \
            --repo kirbsauce/dog-walker-assistant-docs \
            --color FBCA04 \
            --description "Possible doc staleness from app/backend changes" \
            --force

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Scan for doc drift and file issues
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.DOCS_BOT_TOKEN }}
        run: |
          claude -p "$(cat .github/doc-drift-prompt.md)" \
            --model sonnet \
            --max-turns 50 \
            --dangerously-skip-permissions

      # Backstop: emails the maintainer if ANY step above failed (e.g. auth
      # breaks, as in the CLAUDE_CODE_OAUTH_TOKEN outage). Runs only on failure;
      # skips quietly if RESEND_API_KEY isn't set so it never masks the real error.
      - name: Notify on failure
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "RESEND_API_KEY not set — skipping failure email"; exit 0
          fi
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"from\":\"DWA@kirbsauce.com\",\"to\":[\"kirby.drumm@gmail.com\"],\"subject\":\"⚠️ Doc-drift scan failed\",\"html\":\"The nightly doc-drift scan failed.<br><br><a href=\\\"$RUN_URL\\\">View the run logs</a>\"}"
