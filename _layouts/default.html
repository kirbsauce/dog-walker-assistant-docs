<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#111111">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/images/paw-logo.svg' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ '/' | relative_url }}">
      <img class="brand-logo" src="{{ '/images/paw-logo.svg' | relative_url }}" alt="">
      <span class="brand-name">Dog Walker Assistant</span>
    </a>
    <nav class="site-nav">
      <a class="cta" href="https://dwa.kirbsauce.com">Open app ↗</a>
    </nav>
  </header>

  <main class="content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <span>Dog Walker Assistant — shelter dog walking</span>
    <span class="dot">·</span>
    <a href="https://dwa.kirbsauce.com">dwa.kirbsauce.com</a>
  </footer>
</body>
</html>
