title: Dog Walker Assistant
description: Public docs for DWA — walker guide and admin guide.

# Custom dark + amber theme lives in _layouts/ and assets/css/ (matches the app).
# No gem-based theme; every page renders through _layouts/default.html.

# Rewrite .md links in markdown sources to .html at build time, so links like
# `[Walker Guide](WALKER.md)` keep working on github.com AND on the Pages site.
plugins:
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: true

# Render .md files at /WALKER, /ADMIN (no .html suffix in URLs).
permalink: pretty

# Apply the custom layout to every page without per-file front matter repetition.
defaults:
  - scope:
      path: ""
    values:
      layout: default

# Don't include these in the built site.
exclude:
  - README-internal.md
  - .gitignore
